name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ "develop" ] # develop 브랜치에 푸시될 때 실행되도록 설정

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 레포지토리 코드 가져오기
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        
      # 2. Flutter 환경 설정 (필수)
      - name: ☕ Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # 안정적인 채널 사용

      # 3. 프로젝트 의존성 설치
      - name: 🧩 Get Dependencies
        run: flutter pub get

      # 4. Flutter 웹 앱 빌드
      # GitHub Pages 서브 경로에 맞게 --base-href 설정 (매우 중요)
      - name: ClassyParking
        run: flutter build web --release --base-href "/${{ ClassyParking }}/"

      # 5. 빌드 결과물을 GitHub Pages에 배포
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web  # Flutter 빌드 결과물 경로
          # publish_branch: gh-pages # 배포할 브랜치 (기본값)
