name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ "develop" ] # develop 브랜치에 푸시될 때 실행되도록 설정

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 레포지토리 코드 가져오기
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        
      # 2. Flutter 환경 설정 (필수)
      - name: ☕ Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # 안정적인 채널 사용

      # 3. 프로젝트 의존성 설치
      - name: 🧩 Get Dependencies
        # ⬇️ Flutter 프로젝트가 서브 디렉토리(my_flutter_app)에 있다면 경로 지정
        run: flutter pub get
        working-directory: classy_parking # ⬅️ 여기에 실제 Flutter 프로젝트 폴더 이름을 입력하세요!

      # 4. Flutter 웹 앱 빌드
      # 에러 해결을 위해 레포지토리 이름 'ClassyParking'을 하드코딩하여 --base-href 설정 (매우 중요)
      - name: 🏗️ Build Web App
        # 만약 레포지토리 이름이 'ClassyParking'이 아니라면, 이 부분을 실제 레포지토리 이름으로 변경해야 합니다.
        # ⬇️ 빌드 시에도 작업 디렉토리 지정
        run: flutter build web --release --base-href "/ClassyParking/"
        working-directory: classy_parking # ⬅️ 여기에 실제 Flutter 프로젝트 폴더 이름을 입력하세요!

      # 5. 빌드 결과물을 GitHub Pages에 배포
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # ⬇️ 배포 경로도 서브 디렉토리에 맞게 변경
          publish_dir: ./my_flutter_app/build/web # ⬅️ 프로젝트 폴더 이름을 포함하여 경로 수정
          # publish_branch: gh-pages # 배포할 브랜치 (기본값)
